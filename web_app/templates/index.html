<!DOCTYPE html>
<html>
<head>
    <title>Drowsiness Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #video {
            margin: 20px auto;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .button.stop {
            background-color: #f44336;
        }
        #status {
            margin-top: 10px;
            font-weight: bold;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            font-size: 18px;
        }
        .alert {
            color: #f44336;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Real-time Drowsiness Detection</h1>
        <video id="video" width="640" height="480" autoplay></video>
        <canvas id="canvas" width="640" height="480" style="display: none;"></canvas>
        <div>
            <button id="startMonitoring" class="button">Start Monitoring</button>
        </div>
        <div id="status">Monitoring: Stopped</div>
        <div id="result"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startButton = document.getElementById('startMonitoring');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        let stream = null;
        let isMonitoring = false;
        let monitoringInterval = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: 640,
                        height: 480
                    }
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera:", err);
                resultDiv.innerHTML = "Error: Could not access camera";
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        function captureAndAnalyze() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');

                fetch('/predict', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        resultDiv.innerHTML = `Error: ${data.error}`;
                    } else {
                        resultDiv.innerHTML = `Status: <span class="${data.prediction === 'Drowsy' ? 'alert' : ''}">${data.prediction}</span><br>Confidence: ${data.confidence}`;

                        }
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultDiv.innerHTML = 'Error processing request';
                });
            }, 'image/jpeg');
        }

        function startMonitoring() {
            if (!isMonitoring) {
                startCamera();
                monitoringInterval = setInterval(captureAndAnalyze, 2000); // Capture every 2 seconds
                isMonitoring = true;
                startButton.textContent = 'Stop Monitoring';
                startButton.classList.add('stop');
                statusDiv.innerHTML = 'Monitoring: Active';
            } else {
                clearInterval(monitoringInterval);
                stopCamera();
                isMonitoring = false;
                startButton.textContent = 'Start Monitoring';
                startButton.classList.remove('stop');
                statusDiv.innerHTML = 'Monitoring: Stopped';
                resultDiv.innerHTML = '';
            }
        }

        startButton.addEventListener('click', startMonitoring);
    </script>
</body>
</html>
